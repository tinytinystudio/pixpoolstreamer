<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fullscreen MP4 Player</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }


    #video_container {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;      
      object-fit: cover;
      opacity: .9;
    }

  </style>
</head>
<body>
   <img id="video_container" src="assets/lauro.webp" alt="Café animado"> 
</body>
</html>
