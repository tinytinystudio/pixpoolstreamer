<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fullscreen MP4 Player</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    
    img {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }
  </style>
</head>
<body>
  <img src="assets/lauro_2.webp" >
    <section class="copy">
    <h1>Café fresco o dia inteiro</h1>
    <p>Uma pausa mais cremosa para sua equipe e seus clientes.</p>
  </section>
  <script>
    const PROTOCOL = "iframeplayer.v1";
    let adId = null;
    const media = document.querySelector("img");
    function send(type, payload = {}) {
      parent.postMessage({ protocol: PROTOCOL, type, adId, payload }, "*");
    }
    function ready() {
      if (adId) send("ready");
    }
    media.addEventListener("load", ready, { once: true });
    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || message.protocol !== PROTOCOL) return;
      if (message.type === "init") {
        adId = message.adId;
        if (media.complete) ready();
      }
      if (message.type === "play") {
        document.body.classList.add("playing");
        send("started");
      }
      if (message.type === "stop") document.body.classList.remove("playing");
    });
  </script>
</body>

</html>
