<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anúncio Produto</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: #f8fbff;
      background:
        radial-gradient(circle at 72% 28%, rgba(41, 211, 145, .34), transparent 28%),
        linear-gradient(135deg, #071018 0%, #0e2830 45%, #142014 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .scene {
      position: relative;
      width: min(86vw, 1100px);
      min-height: min(70vh, 660px);
      display: grid;
      grid-template-columns: 1fr .9fr;
      align-items: center;
      gap: 48px;
    }
    .copy { transform: translateY(28px); opacity: 0; }
    .eyebrow {
      margin-bottom: 18px;
      color: #6ef0b8;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    h1 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(52px, 8vw, 108px);
      line-height: .92;
      letter-spacing: 0;
    }
    p {
      max-width: 520px;
      margin: 26px 0 0;
      color: rgba(248, 251, 255, .82);
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.25;
    }
    .product {
      position: relative;
      width: min(36vw, 420px);
      aspect-ratio: 1;
      justify-self: center;
      border-radius: 50%;
      background:
        linear-gradient(150deg, #e9fff4 0%, #68e2a8 42%, #0a8b6b 100%);
      box-shadow: 0 44px 100px rgba(0, 0, 0, .35), inset -24px -24px 60px rgba(3, 55, 48, .38);
      transform: rotate(-8deg) scale(.86);
      opacity: 0;
    }
    .product::before {
      content: "";
      position: absolute;
      inset: 17%;
      border-radius: 20%;
      background: rgba(255, 255, 255, .2);
      border: 2px solid rgba(255, 255, 255, .42);
      transform: rotate(18deg);
    }
    .product::after {
      content: "NOVA";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #05251f;
      font-size: clamp(36px, 5vw, 68px);
      font-weight: 900;
    }
    .price {
      position: absolute;
      right: 0;
      bottom: 8%;
      padding: 18px 24px;
      border-radius: 8px;
      color: #06100c;
      background: #f9e36b;
      font-size: clamp(24px, 3.2vw, 44px);
      font-weight: 900;
      transform: translateY(24px);
      opacity: 0;
    }
    body.playing .copy {
      animation: rise 800ms ease forwards;
    }
    body.playing .product {
      animation: pop 900ms 240ms cubic-bezier(.2, .9, .2, 1.2) forwards, float 3200ms 1200ms ease-in-out infinite;
    }
    body.playing .price {
      animation: rise 600ms 900ms ease forwards;
    }
    @keyframes rise { to { transform: translateY(0); opacity: 1; } }
    @keyframes pop { to { transform: rotate(-8deg) scale(1); opacity: 1; } }
    @keyframes float { 50% { transform: rotate(-5deg) translateY(-18px); } }
    @media (max-width: 760px) {
      .scene { grid-template-columns: 1fr; min-height: auto; gap: 28px; }
      .product { width: min(64vw, 320px); }
      .price { right: 6%; bottom: 0; }
    }
  </style>
</head>
<body>
  <section class="scene">
    <div class="copy">
      <div class="eyebrow">Oferta da semana</div>
      <h1>Energia para vender mais</h1>
      <p>Kit promocional pronto para vitrines, balcões e campanhas locais.</p>
    </div>
    <div class="product" aria-label="Produto promocional"></div>
    <div class="price">R$ 29,90</div>
  </section>
  <script>
    const PROTOCOL = "iframeplayer.v1";
    let adId = null;
    function send(type, payload = {}) {
      parent.postMessage({ protocol: PROTOCOL, type, adId, payload }, "*");
    }
    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || message.protocol !== PROTOCOL) return;
      if (message.type === "init") {
        adId = message.adId;
        requestAnimationFrame(() => send("ready"));
      }
      if (message.type === "play") {
        document.body.classList.add("playing");
        send("started");
      }
      if (message.type === "stop") {
        document.body.classList.remove("playing");
      }
    });
    document.body.classList.add("playing");
    requestAnimationFrame(() => send("ready"));
  </script>
</body>
</html>
