<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anúncio WebP Café</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: #fffaf0;
      background: #120d0a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .84;
      transform: scale(1.04);
    }
    .copy {
      position: relative;
      z-index: 1;
      width: min(88vw, 1060px);
      text-shadow: 0 10px 34px rgba(0, 0, 0, .58);
      opacity: 0;
      transform: translateY(32px);
    }
    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(58px, 8vw, 118px);
      line-height: .9;
      letter-spacing: 0;
    }
    p {
      max-width: 560px;
      margin: 24px 0 0;
      font-size: clamp(22px, 2.4vw, 34px);
      line-height: 1.2;
    }
    body.playing .copy { animation: in 800ms ease forwards; }
    @keyframes in { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <img src="assets/cafe-loop.webp" alt="Café animado">
  <section class="copy">
    <h1>Café fresco o dia inteiro</h1>
    <p>Uma pausa mais cremosa para sua equipe e seus clientes.</p>
  </section>
  <script>
    const PROTOCOL = "iframeplayer.v1";
    let adId = null;
    const media = document.querySelector("img");
    function send(type, payload = {}) {
      parent.postMessage({ protocol: PROTOCOL, type, adId, payload }, "*");
    }
    function ready() {
      if (adId) send("ready");
    }
    media.addEventListener("load", ready, { once: true });
    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || message.protocol !== PROTOCOL) return;
      if (message.type === "init") {
        adId = message.adId;
        if (media.complete) ready();
      }
      if (message.type === "play") {
        document.body.classList.add("playing");
        send("started");
      }
      if (message.type === "stop") document.body.classList.remove("playing");
    });
  </script>
</body>
</html>
