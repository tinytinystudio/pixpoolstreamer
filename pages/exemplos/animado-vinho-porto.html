<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anúncio Vinho do Porto</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: #fff8ed;
      background:
        radial-gradient(circle at 78% 26%, rgba(247, 185, 86, .34), transparent 24%),
        radial-gradient(circle at 18% 82%, rgba(89, 15, 36, .7), transparent 34%),
        linear-gradient(135deg, #180711 0%, #4c0d25 48%, #13080c 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .scene {
      position: relative;
      width: min(90vw, 1180px);
      height: min(86vh, 720px);
      display: grid;
      grid-template-columns: 1fr .82fr;
      align-items: center;
      gap: clamp(24px, 5vw, 70px);
      padding: clamp(18px, 3vw, 42px) 0;
    }
    .copy {
      z-index: 2;
      max-width: 660px;
      transform: translateY(34px);
      opacity: 0;
    }
    .eyebrow {
      width: fit-content;
      margin-bottom: clamp(12px, 2vh, 20px);
      padding: clamp(8px, 1.2vw, 12px) clamp(12px, 1.8vw, 18px);
      border: 1px solid rgba(255, 222, 154, .62);
      border-radius: 8px;
      color: #ffdc91;
      background: rgba(23, 8, 13, .34);
      font-size: clamp(13px, 1.6vw, 19px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    h1 {
      margin: 0;
      max-width: 640px;
      font-size: clamp(44px, 7.4vw, 104px);
      line-height: .9;
      letter-spacing: 0;
    }
    p {
      max-width: 560px;
      margin: clamp(18px, 3vh, 28px) 0 0;
      color: rgba(255, 248, 237, .84);
      font-size: clamp(19px, 2.15vw, 30px);
      line-height: 1.22;
    }
    .offer {
      display: inline-flex;
      align-items: baseline;
      gap: clamp(8px, 1.3vw, 14px);
      margin-top: clamp(22px, 4vh, 38px);
      padding: clamp(12px, 1.8vw, 18px) clamp(16px, 2.5vw, 28px);
      border-radius: 8px;
      color: #22080f;
      background: #f6c15f;
      box-shadow: 0 20px 54px rgba(0, 0, 0, .28);
      transform: translateY(28px);
      opacity: 0;
    }
    .offer strong {
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1;
    }
    .offer span {
      font-size: clamp(15px, 1.55vw, 21px);
      font-weight: 800;
      text-transform: uppercase;
    }
    .product-area {
      position: relative;
      width: min(35vw, 420px);
      min-width: 250px;
      aspect-ratio: .72;
      justify-self: center;
      transform: translateX(40px) rotate(5deg) scale(.9);
      opacity: 0;
    }
    .glow {
      position: absolute;
      inset: 18% -18% 4%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(246, 193, 95, .42), transparent 64%);
      filter: blur(4px);
    }
    .bottle {
      position: absolute;
      left: 38%;
      bottom: 3%;
      width: 34%;
      height: 84%;
      border-radius: 18% 18% 9% 9% / 8% 8% 4% 4%;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .16), transparent 24%),
        linear-gradient(110deg, #2a0914 0%, #64162e 42%, #19070d 100%);
      box-shadow: 0 36px 78px rgba(0, 0, 0, .42), inset -14px 0 28px rgba(0, 0, 0, .28);
    }
    .bottle::before {
      content: "";
      position: absolute;
      left: 27%;
      top: -25%;
      width: 46%;
      height: 32%;
      border-radius: 18% 18% 5% 5%;
      background: linear-gradient(90deg, #40101f, #13060a);
    }
    .bottle::after {
      content: "PORTO";
      position: absolute;
      left: 50%;
      top: 45%;
      width: 78%;
      padding: clamp(10px, 1.2vw, 15px) 0;
      border-radius: 8px;
      color: #2b0912;
      background: linear-gradient(180deg, #fff1c5, #d99c45);
      font-size: clamp(16px, 2vw, 28px);
      font-weight: 950;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .glass {
      position: absolute;
      right: 1%;
      bottom: 4%;
      width: 33%;
      height: 47%;
      border: clamp(4px, .6vw, 7px) solid rgba(255, 246, 222, .72);
      border-top-width: clamp(5px, .7vw, 8px);
      border-radius: 12% 12% 45% 45% / 8% 8% 60% 60%;
      background:
        linear-gradient(to top, rgba(121, 17, 42, .88) 0 48%, transparent 49%),
        linear-gradient(90deg, rgba(255, 255, 255, .22), transparent 34%);
      box-shadow: 0 24px 54px rgba(0, 0, 0, .32);
    }
    .glass::before {
      content: "";
      position: absolute;
      left: 47%;
      top: 100%;
      width: 7%;
      height: 34%;
      background: rgba(255, 246, 222, .74);
      transform: translateX(-50%);
    }
    .glass::after {
      content: "";
      position: absolute;
      left: 24%;
      top: 132%;
      width: 52%;
      height: 7%;
      border-radius: 999px;
      background: rgba(255, 246, 222, .74);
    }
    .seal {
      position: absolute;
      right: 2%;
      top: 7%;
      display: grid;
      place-items: center;
      width: clamp(82px, 10vw, 132px);
      aspect-ratio: 1;
      border-radius: 50%;
      color: #fff8ed;
      background: #7d1432;
      border: clamp(4px, .6vw, 7px) solid #f6c15f;
      font-size: clamp(15px, 1.5vw, 22px);
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      transform: rotate(10deg) scale(.7);
      opacity: 0;
    }
    body.playing .copy {
      animation: rise 760ms ease forwards;
    }
    body.playing .product-area {
      animation: productIn 900ms 220ms cubic-bezier(.2, .9, .2, 1.16) forwards, float 3600ms 1300ms ease-in-out infinite;
    }
    body.playing .offer {
      animation: rise 640ms 820ms ease forwards;
    }
    body.playing .seal {
      animation: sealIn 640ms 980ms cubic-bezier(.2, .9, .2, 1.2) forwards;
    }
    @keyframes rise { to { transform: translateY(0); opacity: 1; } }
    @keyframes productIn { to { transform: translateX(0) rotate(5deg) scale(1); opacity: 1; } }
    @keyframes float { 50% { transform: translateY(-16px) rotate(2deg); } }
    @keyframes sealIn { to { transform: rotate(10deg) scale(1); opacity: 1; } }
    @media (max-width: 780px) {
      .scene {
        width: min(90vw, 620px);
        height: 92vh;
        grid-template-columns: 1fr;
        align-content: center;
        gap: clamp(12px, 3vh, 24px);
      }
      .copy { text-align: left; }
      .product-area {
        width: min(58vw, 270px);
        min-width: 190px;
      }
      .seal { right: 8%; top: 42%; }
    }
    @media (max-height: 560px) {
      .scene {
        height: 94vh;
        grid-template-columns: 1.1fr .75fr;
        gap: 20px;
        padding: 8px 0;
      }
      h1 { font-size: clamp(36px, 8vh, 62px); }
      p { margin-top: 12px; font-size: clamp(16px, 3.2vh, 22px); }
      .offer { margin-top: 14px; }
      .product-area { width: min(28vw, 260px); min-width: 180px; }
    }
  </style>
</head>
<body>
  <section class="scene" aria-label="Anúncio de vinho do Porto">
    <div class="copy">
      <div class="eyebrow">Portugal na taça</div>
      <h1>Vinho do Porto tinto</h1>
      <p>Cor intensa, final aveludado e presença perfeita para brindar hoje.</p>
      <div class="offer"><strong>R$ 89,90</strong><span>garrafa 750ml</span></div>
    </div>
    <div class="product-area" aria-label="Garrafa e taça de vinho do Porto">
      <div class="glow"></div>
      <div class="bottle"></div>
      <div class="glass"></div>
    </div>
    <div class="seal">Safra<br>especial</div>
  </section>
  <script>
    const PROTOCOL = "iframeplayer.v1";
    let adId = null;
    function send(type, payload = {}) {
      parent.postMessage({ protocol: PROTOCOL, type, adId, payload }, "*");
    }

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || message.protocol !== PROTOCOL) return;
      if (message.type === "init") {
        adId = message.adId;
        requestAnimationFrame(() => send("ready"));
      }
      if (message.type === "play") {
        document.body.classList.add("playing");
        send("started");
      }
      if (message.type === "stop") {
        document.body.classList.remove("playing");
      }
    });

    document.body.classList.add("playing");
    requestAnimationFrame(() => send("ready"));
  </script>
</body>
</html>
