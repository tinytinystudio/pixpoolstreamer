<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anúncio Serviço</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      color: #10131a;
      background: linear-gradient(160deg, #f8fbff 0%, #d8f3ff 54%, #fff0c8 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      width: min(90vw, 1180px);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      align-items: center;
      gap: 56px;
    }
    h1 {
      margin: 0;
      font-size: clamp(48px, 7vw, 96px);
      line-height: .96;
      letter-spacing: 0;
      transform: translateX(-36px);
      opacity: 0;
    }
    p {
      max-width: 540px;
      margin: 24px 0 0;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.25;
      color: rgba(16, 19, 26, .74);
      transform: translateX(-28px);
      opacity: 0;
    }
    .board {
      position: relative;
      min-height: 520px;
    }
    .tile {
      position: absolute;
      display: grid;
      place-items: center;
      width: clamp(160px, 22vw, 270px);
      aspect-ratio: 1.18;
      border: 1px solid rgba(16, 19, 26, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 26px 70px rgba(22, 61, 89, .18);
      font-size: clamp(20px, 2.3vw, 34px);
      font-weight: 900;
      transform: translateY(60px) rotate(var(--r));
      opacity: 0;
    }
    .tile:nth-child(1) { --r: -7deg; left: 3%; top: 4%; background: #fff; }
    .tile:nth-child(2) { --r: 5deg; right: 3%; top: 20%; background: #1f7ae0; color: white; }
    .tile:nth-child(3) { --r: -2deg; left: 24%; bottom: 4%; background: #ffd86b; }
    .cta {
      display: inline-flex;
      margin-top: 34px;
      padding: 18px 24px;
      border-radius: 8px;
      background: #10131a;
      color: #fff;alt="Café animado"
      font-size: clamp(18px, 1.8vw, 24px);
      font-weight: 800;
      transform: translateY(22px);
      opacity: 0;
    }
    body.playing h1 { animation: inLeft 760ms ease forwards; }
    body.playing p { animation: inLeft 760ms 160ms ease forwards; }
    body.playing .cta { animation: rise 620ms 420ms ease forwards; }
    body.playing .tile:nth-child(1) { animation: tileIn 720ms 220ms ease forwards; }
    body.playing .tile:nth-child(2) { animation: tileIn 720ms 430ms ease forwards; }
    body.playing .tile:nth-child(3) { animation: tileIn 720ms 620ms ease forwards; }
    @keyframes inLeft { to { transform: translateX(0); opacity: 1; } }
    @keyframes rise { to { transform: translateY(0); opacity: 1; } }
    @keyframes tileIn { to { transform: translateY(0) rotate(var(--r)); opacity: 1; } }
    @media (max-width: 820px) {
      .wrap { grid-template-columns: 1fr; gap: 20px; padding: 38px 0; align-content: center; }
      .board { min-height: 360px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section>
      <h1>Agende hoje. Atenda melhor.</h1>
      <p>Organize filas, horários e confirmações em uma tela simples para sua equipe.</p>
      <div class="cta">Comece em minutos</div>
    </section>
    <section class="board" aria-label="Benefícios">
      <div class="tile">Agenda</div>
      <div class="tile">Avisos</div>
      <div class="tile">Controle</div>
    </section>
  </main>
  <script>
    const PROTOCOL = "iframeplayer.v1";
    let adId = null;
    function send(type, payload = {}) {
      parent.postMessage({ protocol: PROTOCOL, type, adId, payload }, "*");
    }
    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || message.protocol !== PROTOCOL) return;
      if (message.type === "init") {
        adId = message.adId;
        send("ready");
      }
      if (message.type === "play") {
        document.body.classList.add("playing");
        send("started");
      }
      if (message.type === "stop") document.body.classList.remove("playing");
    });
    document.body.classList.add("playing");
  </script>
</body>
</html>
